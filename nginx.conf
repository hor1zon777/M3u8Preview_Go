upstream api {
    server 127.0.0.1:${APP_PORT};
}

server {
    listen ${NGINX_PORT};
    server_name _;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/vnd.ms-fontobject application/x-font-ttf font/opentype image/svg+xml;

    # Security headers (CSP 由 Go 后端动态生成，自动包含验证码服务白名单)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Vite build assets（带内容哈希，immutable 长缓存，直接由 nginx 提供）
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Upload files（UUID 文件名，短缓存方便备份恢复后刷新）
    location /uploads/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 5m;
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # 备份恢复上传：大文件专用通道（与 Go 后端 maxBackupUploadBytes=2GiB 对齐）
    # 仅 admin 端点，Go 侧已有 fh.Size + io.LimitReader 双重防护
    location ~ ^/api/v1/admin/backup/import(/upload)?$ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_request_buffering off;  # 流式直通，避免 nginx 将 GB 级上传完整落盘缓冲
        client_max_body_size 2g;
    }

    # v3 audio worker 推送 FLAC（单流模式，仅内网/直连源站时可用，不走 CDN）：
    # 与 Go 后端 maxAudioStreamBytes=1GiB 对齐
    # broker 设计要求"零落盘"，nginx 必须流式直通到 Go 的 io.Pipe，否则破坏实时转发语义
    # 路径形如 /api/v1/worker/jobs/<jobId>/audio-stream
    location ~ ^/api/v1/worker/jobs/[^/]+/audio-stream$ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_request_buffering off;  # 流式直通：把 audio worker 的 FLAC 字节实时送到 Go pipe writer
        client_max_body_size 1g;      # Go 端 maxAudioStreamBytes 同值，超限统一在 Go 层 413
    }

    # v3.2 audio worker 分块推送 FLAC（绕开 Cloudflare 等 CDN 100 MiB body 上限）：
    # 客户端按 90 MiB 切片，服务端按 maxAudioStreamChunkBytes=95 MiB 兜底
    # broker 在同一条 io.Pipe 上拼接转发，subtitle worker 端无感知
    # 路径形如 /api/v1/worker/jobs/<jobId>/audio-stream-chunk
    location ~ ^/api/v1/worker/jobs/[^/]+/audio-stream-chunk$ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_request_buffering off;  # 流式直通：每个 chunk 实时送到 broker pipe
        client_max_body_size 95m;     # 与 Go 端 maxAudioStreamChunkBytes 对齐
    }

    # v3 subtitle worker 拉 FLAC：broker 通过 io.Pipe 实时把 audio worker 上传流转给 GET 响应
    # 必须关闭响应缓冲（默认 on 会让 nginx 先缓存全部响应再发给客户端，破坏 chunked 实时性）
    # 路径形如 /api/v1/worker/jobs/<jobId>/audio （注意：用 $ 锚定，避免抢 audio-stream 的匹配）
    location ~ ^/api/v1/worker/jobs/[^/]+/audio$ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;          # 关键：响应不缓冲，subtitle worker 实时拿到 broker 转发流
    }

    # 其余请求全部代理到 Go（API + SPA HTML fallback，CSP 由 Go 设置）
    location / {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 20m;
    }
}
